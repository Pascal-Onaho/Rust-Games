name: Build and Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup update stable
          rustup target add wasm32-unknown-unknown

      - name: Build
        working-directory: ./DNA_PUZZLE_GAME
        run: cargo build --release --target wasm32-unknown-unknown

      - name: Prepare Deployment Directory
        run: |
          mkdir -p ./deploy
          cp "./DNA_PUZZLE_GAME/target/wasm32-unknown-unknown/release/DNA_Puzzle_Game.wasm" ./deploy/
          cp "./DNA_PUZZLE_GAME/index.html" ./deploy/

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy